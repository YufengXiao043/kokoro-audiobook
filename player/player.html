<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kokoro Audiobook Player</title>
<style>
  /* ── Reset & tokens ───────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f9f7;
    --surface: #ffffff;
    --border: #e0ddd8;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #4a6fa5;
    --accent-hover: #3a5f95;
    --highlight-bg: #fff3b0;
    --highlight-border: #e6c62a;
    --progress-bg: #e0ddd8;
    --progress-fill: #4a6fa5;
    --btn-bg: #4a6fa5;
    --btn-text: #ffffff;
    --font: 'Georgia', 'Times New Roman', serif;
    --ui-font: system-ui, -apple-system, sans-serif;
    --radius: 6px;
  }

  [data-theme="dark"] {
    --bg: #1a1a1e;
    --surface: #25252a;
    --border: #3a3a42;
    --text: #e8e6e0;
    --muted: #9a9a9a;
    --accent: #7aa2d4;
    --accent-hover: #8ab2e4;
    --highlight-bg: #3d3510;
    --highlight-border: #b89c20;
    --progress-bg: #3a3a42;
    --progress-fill: #7aa2d4;
    --btn-bg: #3a5a8a;
    --btn-text: #ffffff;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--ui-font);
    transition: background 0.2s, color 0.2s;
  }

  /* ── Layout ───────────────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* ── Top bar ─────────────────────────────────────────────────── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #topbar h1 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 10px;
    cursor: pointer;
    color: var(--muted);
    font-family: var(--ui-font);
    font-size: 0.8rem;
    transition: border-color 0.15s, color 0.15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Load panel (shown when no file loaded) ──────────────────── */
  #load-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    text-align: center;
  }

  #load-panel h2 { font-size: 1.4rem; color: var(--text); }
  #load-panel p { color: var(--muted); font-size: 0.9rem; max-width: 420px; line-height: 1.6; }

  .load-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 480px;
  }

  .load-card {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
    cursor: pointer;
    transition: border-color 0.15s;
    text-align: center;
  }
  .load-card:hover { border-color: var(--accent); }
  .load-card.drag-over { border-color: var(--accent); background: var(--highlight-bg); }
  .load-card .card-icon { font-size: 2rem; margin-bottom: 8px; }
  .load-card .card-label { font-size: 0.85rem; color: var(--muted); }
  .load-card .card-title { font-weight: 600; margin-bottom: 4px; }

  .load-btn {
    background: var(--btn-bg);
    color: var(--btn-text);
    border: none;
    border-radius: var(--radius);
    padding: 10px 28px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .load-btn:hover { background: var(--accent-hover); }

  /* hidden file inputs */
  #audio-input, #json-input { display: none; }

  /* ── Player (shown after files are loaded) ───────────────────── */
  #player-panel {
    flex: 1;
    display: none;
    flex-direction: column;
    gap: 0;
    overflow: hidden;
    padding-bottom: 8px;
  }

  /* Text panel */
  #text-panel {
    flex: 1;
    overflow-y: auto;
    padding: 20px 4px 12px;
    font-family: var(--font);
    font-size: 1.05rem;
    line-height: 1.85;
    color: var(--text);
    scroll-behavior: smooth;
  }

  .sentence {
    display: inline;
    cursor: pointer;
    border-radius: 3px;
    padding: 1px 2px;
    transition: background 0.15s;
  }
  .sentence:hover { background: var(--highlight-bg); opacity: 0.7; }
  .sentence.active {
    background: var(--highlight-bg);
    border-bottom: 2px solid var(--highlight-border);
  }

  /* Spacer between sentences */
  .sentence-sep { display: inline; }

  /* ── Controls bar ────────────────────────────────────────────── */
  #controls {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Progress bar */
  #progress-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #progress-bar {
    flex: 1;
    height: 6px;
    background: var(--progress-bg);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  #progress-fill {
    height: 100%;
    background: var(--progress-fill);
    border-radius: 3px;
    width: 0%;
    transition: width 0.2s;
    pointer-events: none;
  }

  .time-label {
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
    min-width: 38px;
    text-align: center;
  }

  /* Button row */
  #btn-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #play-btn {
    background: var(--btn-bg);
    color: var(--btn-text);
    border: none;
    border-radius: var(--radius);
    width: 42px;
    height: 36px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #play-btn:hover { background: var(--accent-hover); }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 9px;
    font-size: 0.9rem;
    cursor: pointer;
    color: var(--muted);
    transition: border-color 0.15s, color 0.15s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  #speed-label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-left: auto;
    white-space: nowrap;
  }

  #speed-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 6px;
    font-size: 0.8rem;
    color: var(--text);
    cursor: pointer;
  }

  #sentence-counter {
    font-size: 0.75rem;
    color: var(--muted);
    margin-left: 6px;
  }

  /* Keyboard hint */
  #key-hint {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
    opacity: 0.7;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <h1 id="title-label">Kokoro Audiobook Player</h1>
    <button class="icon-btn" id="load-new-btn" title="Load new files">&#128194; Load</button>
    <button class="icon-btn" id="theme-btn" title="Toggle dark/light mode">&#9790; Theme</button>
  </div>

  <!-- Hidden file inputs -->
  <input type="file" id="audio-input" accept="audio/*">
  <input type="file" id="json-input" accept="application/json,.json">

  <!-- Load panel -->
  <div id="load-panel">
    <h2>Load your audiobook</h2>
    <p>Select the MP3 audio file and the timestamps JSON file generated by the pipeline.</p>

    <div class="load-grid">
      <div class="load-card" id="audio-card" title="Click to select audio file">
        <div class="card-icon">&#127925;</div>
        <div class="card-title">Audio File</div>
        <div class="card-label" id="audio-name">No file selected</div>
      </div>
      <div class="load-card" id="json-card" title="Click to select timestamps JSON">
        <div class="card-icon">&#128196;</div>
        <div class="card-title">Timestamps JSON</div>
        <div class="card-label" id="json-name">No file selected</div>
      </div>
    </div>

    <button class="load-btn" id="start-btn" disabled>Start Playing</button>
  </div>

  <!-- Player panel -->
  <div id="player-panel">
    <div id="text-panel" role="main"></div>
    <div id="controls">
      <div id="progress-wrap">
        <span class="time-label" id="time-current">0:00</span>
        <div id="progress-bar" role="slider" aria-label="Playback position">
          <div id="progress-fill"></div>
        </div>
        <span class="time-label" id="time-total">0:00</span>
      </div>
      <div id="btn-row">
        <button id="play-btn" title="Play/Pause (Space)">&#9654;</button>
        <button class="nav-btn" id="prev-btn" title="Previous sentence (Left arrow)">&#9664;&#9664;</button>
        <button class="nav-btn" id="next-btn" title="Next sentence (Right arrow)">&#9654;&#9654;</button>
        <span id="sentence-counter"></span>
        <span id="speed-label">Speed:</span>
        <select id="speed-select">
          <option value="0.5">0.5×</option>
          <option value="0.75">0.75×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
          <option value="1.75">1.75×</option>
          <option value="2">2×</option>
        </select>
      </div>
      <div id="key-hint">Space: play/pause &nbsp;·&nbsp; ← →: skip sentence &nbsp;·&nbsp; Click text to seek</div>
    </div>
  </div>
</div>

<!-- Hidden audio element -->
<audio id="audio-el" preload="auto"></audio>

<script>
// ── State ─────────────────────────────────────────────────────────────
const state = {
  timestamps: [],      // [{text, start, end}, ...]
  currentIndex: -1,    // index of currently highlighted sentence
  audioReady: false,
  jsonReady: false,
  audioObjectUrl: null,
  lastPosition: 0,     // in-memory last position (seconds)
};

// ── DOM refs ──────────────────────────────────────────────────────────
const audioEl       = document.getElementById('audio-el');
const loadPanel     = document.getElementById('load-panel');
const playerPanel   = document.getElementById('player-panel');
const textPanel     = document.getElementById('text-panel');
const playBtn       = document.getElementById('play-btn');
const prevBtn       = document.getElementById('prev-btn');
const nextBtn       = document.getElementById('next-btn');
const speedSelect   = document.getElementById('speed-select');
const progressBar   = document.getElementById('progress-bar');
const progressFill  = document.getElementById('progress-fill');
const timeCurrent   = document.getElementById('time-current');
const timeTotal     = document.getElementById('time-total');
const sentCounter   = document.getElementById('sentence-counter');
const titleLabel    = document.getElementById('title-label');
const audioInput    = document.getElementById('audio-input');
const jsonInput     = document.getElementById('json-input');
const audioCard     = document.getElementById('audio-card');
const jsonCard      = document.getElementById('json-card');
const audioName     = document.getElementById('audio-name');
const jsonName      = document.getElementById('json-name');
const startBtn      = document.getElementById('start-btn');
const loadNewBtn    = document.getElementById('load-new-btn');
const themeBtn      = document.getElementById('theme-btn');

// ── Theme ─────────────────────────────────────────────────────────────
let darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
function applyTheme() {
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  themeBtn.textContent = darkMode ? '☀ Theme' : '☾ Theme';
}
applyTheme();
themeBtn.addEventListener('click', () => { darkMode = !darkMode; applyTheme(); });

// ── File loading helpers (shared by click and drag-and-drop) ──────────
function loadAudioFile(file) {
  if (state.audioObjectUrl) URL.revokeObjectURL(state.audioObjectUrl);
  state.audioObjectUrl = URL.createObjectURL(file);
  audioEl.src = state.audioObjectUrl;
  audioName.textContent = file.name;
  titleLabel.textContent = file.name.replace(/\.[^.]+$/, '');
  state.audioReady = true;
}

function loadJsonFile(file, onDone) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (!Array.isArray(parsed) || parsed.length === 0) {
        alert('Invalid timestamps file: expected a non-empty JSON array.');
        onDone && onDone(false);
        return;
      }
      state.timestamps = parsed;
      jsonName.textContent = file.name;
      state.jsonReady = true;
      onDone && onDone(true);
    } catch {
      alert('Could not parse timestamps JSON file.');
      onDone && onDone(false);
    }
  };
  reader.readAsText(file);
}

function checkBothReady() {
  startBtn.disabled = !(state.audioReady && state.jsonReady);
}

// ── File loading (click) ──────────────────────────────────────────────
audioCard.addEventListener('click', () => audioInput.click());
jsonCard.addEventListener('click', () => jsonInput.click());

audioInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  loadAudioFile(file);
  checkBothReady();
});

jsonInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  loadJsonFile(file, () => checkBothReady());
});

startBtn.addEventListener('click', startPlayer);
loadNewBtn.addEventListener('click', () => {
  audioEl.pause();
  playerPanel.style.display = 'none';
  loadPanel.style.display = 'flex';
});

// ── Drag-and-drop ─────────────────────────────────────────────────────
document.addEventListener('dragover', (e) => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  audioCard.classList.add('drag-over');
  jsonCard.classList.add('drag-over');
});

document.addEventListener('dragleave', (e) => {
  // Only reset when the cursor leaves the browser window entirely
  if (e.relatedTarget === null) {
    audioCard.classList.remove('drag-over');
    jsonCard.classList.remove('drag-over');
  }
});

document.addEventListener('drop', (e) => {
  e.preventDefault();
  audioCard.classList.remove('drag-over');
  jsonCard.classList.remove('drag-over');

  const files = Array.from(e.dataTransfer.files);
  if (!files.length) return;

  // Classify dropped files by extension
  let audioFile = null, jsonFile = null;
  for (const f of files) {
    const ext = f.name.split('.').pop().toLowerCase();
    if (ext === 'wav' || ext === 'mp3') audioFile = f;
    else if (ext === 'json') jsonFile = f;
  }

  if (audioFile) loadAudioFile(audioFile);

  // After all async loading completes, auto-start if both files are ready
  const tryAutoStart = () => {
    if (state.audioReady && state.jsonReady) {
      startPlayer();
      audioEl.play().catch(() => {});
      playBtn.innerHTML = '&#9646;&#9646;';
    } else {
      // Partial drop: ensure load panel is visible for manual selection
      if (playerPanel.style.display !== 'none') {
        audioEl.pause();
        playerPanel.style.display = 'none';
        loadPanel.style.display = 'flex';
      }
      checkBothReady();
    }
  };

  if (jsonFile) {
    loadJsonFile(jsonFile, () => tryAutoStart());
  } else {
    tryAutoStart();
  }
});

// ── Build text panel ──────────────────────────────────────────────────
function startPlayer() {
  loadPanel.style.display = 'none';
  playerPanel.style.display = 'flex';

  // Build sentence spans
  textPanel.innerHTML = '';
  state.timestamps.forEach((item, i) => {
    const span = document.createElement('span');
    span.className = 'sentence';
    span.dataset.index = i;
    span.textContent = item.text;
    span.addEventListener('click', () => seekToSentence(i));
    textPanel.appendChild(span);
    // Add a space between sentences
    textPanel.appendChild(document.createTextNode(' '));
  });

  // Set total time once metadata loads
  audioEl.addEventListener('loadedmetadata', updateTotalTime, { once: true });
  if (audioEl.readyState >= 1) updateTotalTime();

  // Restore last position
  if (state.lastPosition > 0) {
    audioEl.currentTime = state.lastPosition;
  }

  updateHighlight(0);
}

function updateTotalTime() {
  timeTotal.textContent = formatTime(audioEl.duration || 0);
}

// ── Playback controls ─────────────────────────────────────────────────
playBtn.addEventListener('click', togglePlay);

function togglePlay() {
  if (audioEl.paused) {
    audioEl.play();
    playBtn.innerHTML = '&#9646;&#9646;';
  } else {
    audioEl.pause();
    playBtn.innerHTML = '&#9654;';
  }
}

audioEl.addEventListener('ended', () => {
  playBtn.innerHTML = '&#9654;';
});

speedSelect.addEventListener('change', () => {
  audioEl.playbackRate = parseFloat(speedSelect.value);
});

prevBtn.addEventListener('click', () => {
  const idx = Math.max(0, state.currentIndex - 1);
  seekToSentence(idx);
});

nextBtn.addEventListener('click', () => {
  const idx = Math.min(state.timestamps.length - 1, state.currentIndex + 1);
  seekToSentence(idx);
});

function seekToSentence(index) {
  if (index < 0 || index >= state.timestamps.length) return;
  const t = state.timestamps[index];
  audioEl.currentTime = t.start;
  state.lastPosition = t.start;
  updateHighlight(index);
  if (audioEl.paused) {
    audioEl.play();
    playBtn.innerHTML = '&#9646;&#9646;';
  }
}

// ── Time update / highlight sync ──────────────────────────────────────
audioEl.addEventListener('timeupdate', () => {
  const ct = audioEl.currentTime;
  state.lastPosition = ct;

  // Update progress bar
  if (audioEl.duration > 0) {
    progressFill.style.width = (ct / audioEl.duration * 100) + '%';
  }
  timeCurrent.textContent = formatTime(ct);

  // Find active sentence using binary search
  const idx = findActiveSentence(ct);
  if (idx !== state.currentIndex) {
    updateHighlight(idx);
  }
});

function findActiveSentence(time) {
  const ts = state.timestamps;
  if (!ts.length) return -1;
  let lo = 0, hi = ts.length - 1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (time < ts[mid].start) {
      hi = mid - 1;
    } else if (time >= ts[mid].end) {
      lo = mid + 1;
    } else {
      return mid;
    }
  }
  // time is past all segments or before first; return closest
  if (time >= ts[ts.length - 1].end) return ts.length - 1;
  return lo < ts.length ? lo : -1;
}

function updateHighlight(index) {
  // Remove previous highlight
  if (state.currentIndex >= 0) {
    const prev = textPanel.querySelector(`[data-index="${state.currentIndex}"]`);
    if (prev) prev.classList.remove('active');
  }
  state.currentIndex = index;
  if (index < 0) return;

  const el = textPanel.querySelector(`[data-index="${index}"]`);
  if (el) {
    el.classList.add('active');
    // Auto-scroll: keep active sentence in view with some context
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // Ensure it's not hidden at the very top or bottom
    const panelRect = textPanel.getBoundingClientRect();
    const elRect = el.getBoundingClientRect();
    if (elRect.top < panelRect.top + 60) {
      textPanel.scrollTop -= 80;
    } else if (elRect.bottom > panelRect.bottom - 60) {
      textPanel.scrollTop += 80;
    }
  }

  sentCounter.textContent = `${index + 1} / ${state.timestamps.length}`;
}

// ── Progress bar click to seek ────────────────────────────────────────
progressBar.addEventListener('click', (e) => {
  if (!audioEl.duration) return;
  const rect = progressBar.getBoundingClientRect();
  const fraction = (e.clientX - rect.left) / rect.width;
  audioEl.currentTime = Math.max(0, Math.min(audioEl.duration, fraction * audioEl.duration));
});

// ── Keyboard shortcuts ────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  // Ignore if typing in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (playerPanel.style.display === 'none') return;

  switch (e.key) {
    case ' ':
    case 'Spacebar':
      e.preventDefault();
      togglePlay();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      prevBtn.click();
      break;
    case 'ArrowRight':
      e.preventDefault();
      nextBtn.click();
      break;
  }
});

// ── Helpers ───────────────────────────────────────────────────────────
function formatTime(seconds) {
  if (!isFinite(seconds)) return '0:00';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}
</script>
</body>
</html>
